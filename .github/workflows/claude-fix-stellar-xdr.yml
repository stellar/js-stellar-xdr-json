name: Claude Fix stellar-xdr

# When the Rust CI fails on the dependabot PR that updates stellar-xdr, run
# the Claude Code action on the PR branch so Claude investigates and pushes a
# fix. This workflow is scoped to only the stellar-xdr dependabot PR (branch
# prefix `dependabot/cargo/stellar-xdr-`) — other dependabot PRs are not
# affected.

on:
  workflow_run:
    workflows: ["Rust"]
    types: [completed]

# Revoke all default GITHUB_TOKEN permissions at the workflow level. The job
# below opts in to what it needs, so a future job added without its own
# `permissions:` block inherits nothing.
permissions: {}

jobs:

  request-claude-fix:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/cargo/stellar-xdr-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
    - name: Find the PR
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const run = context.payload.workflow_run;
          const { data: prs } = await github.rest.pulls.list({
            owner: context.repo.owner,
            repo: context.repo.repo,
            head: `${context.repo.owner}:${run.head_branch}`,
            state: 'open',
          });
          if (prs.length === 0) {
            core.info(`No open PR found for head branch ${run.head_branch}`);
            return;
          }
          core.setOutput('number', prs[0].number);

    - name: Checkout PR branch
      if: steps.pr.outputs.number != ''
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.workflow_run.head_branch }}

    - name: Run Claude Code to fix the failure
      if: steps.pr.outputs.number != ''
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        prompt: |
          The `Rust` CI failed on PR #${{ steps.pr.outputs.number }}, which is a dependabot update of the `stellar-xdr` crate.

          Investigate the failure in workflow run ${{ github.event.workflow_run.html_url }}, push any source changes required to adopt the new `stellar-xdr` version onto this branch, and ensure CI passes.
        # --max-turns caps how many tool-use cycles Claude can run, which bounds
        # token spend per invocation.
        claude_args: |
          --max-turns 30
